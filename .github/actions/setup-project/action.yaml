name: Setup project
description: 项目初始化
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
      with:
        run_install: false
    - uses: actions/setup-node@v6
      with:
        node-version: 26
        cache: pnpm
    - run: pnpm install
      shell: bash    
    - run: pnpm run init-api-types
      shell: bash
